   dumpHeartbeats = 0L;
   dumpsResetHeartbeats = false;
   dumpInstrs = 0L;
   restarts = 0;
   syscallBlacklistRegex = ".*";
   mask = "0";
   ffiPoints = "";
   command = "./ptr_chase";
   input = "";
   loader = "";
   env = "";
 };



process1 :
{
  patchRoot = "";
  groupWithPrevious = false;
  startFastForwarded = true; // true if we have ROI
  syncedFastForward = "Multiprocess";
  startPaused = false;
  clockDomain = 0;
  portDomain = 0;
  dumpHeartbeats = 0L;
  dumpsResetHeartbeats = false;
  dumpInstrs = 0L;
  restarts = 0;
  syscallBlacklistRegex = ".*";
  mask = "1:24"; # IT MEANS cores 1, 2, ..., 23.
  ffiPoints = "";
  command = "./traffic_gen.x -r rd_percentage -p pause";
  input = "";
  loader = "";
  env = "";
};

