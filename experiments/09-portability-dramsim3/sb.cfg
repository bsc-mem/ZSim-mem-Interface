sim :
{
  attachDebugger = false;
  traceDriven = false;
  domains = 1;
  contentionThreads = 1;
  phaseLength = 1000;
  statsPhaseInterval = 100;
  maxPhases = 2000L; # 25000
  maxMinInstrs = 0L;
  maxTotalInstrs = 900000000000L; #50000000000L;
  maxSimTime = 0;
  maxProcEventualDumps = 0;
  skipStatsVectors = false;
  compactPeriodicStats = true;
  ignoreHooks = false;
  ffReinstrument = false;
  registerThreads = false;
  startInGlobalPause = false;
  parallelism = 32;
  schedQuantum = 50;
  blockingSyscalls = false;
  pinOptions = "";
  logToFile = true;
  printHierarchy = false;
  procStatsFilter = "";
  perProcessDir = false;
  periodicStatsFilter = "";
  perProcessCpuEnum = false;
  printMemoryStats = true;
  gmMBytes = 16384;
  deadlockDetection = false;
  aslr = false;
  strictConfig = true;
};
sys :
{
  cores :
  {
    skylake :
    {
      cores = 24;
      type = "OOO";
      icache = "l1i";
      dcache = "l1d";
    };
  };
  frequency = 2100;
  lineSize = 64;
  #networkFile = "";
  caches :
  {
    l1d :
    {
      children = "";
      isPrefetcher = false;
      size = 32768;
      banks = 1;
      caches = 24;
      type = "Simple";
      array :
      {
        ways = 8;
        type = "SetAssoc";
        hash = "None";
      };
      repl :
      {
        type = "LRU";
      };
      latency = 4;
      nonInclusiveHack = false;
    };
    l1i :
    {
      children = "";
      isPrefetcher = false;
      size = 32768;
      banks = 1;
      caches = 24;
      type = "Simple";
      array :
      {
        ways = 8;
        type = "SetAssoc";
        hash = "None";
      };
      repl :
      {
        type = "LRU";
      };
      latency = 4;
      nonInclusiveHack = false;
    };
    l1d-pref:
    {
      children = "l1d";
      isPrefetcher = true;
      prefetchers = 24;
    };
    l2 :
    {
      children = "l1i|l1d-pref";
      # children = "l1i|l1d";
      isPrefetcher = false;
      size = 1048576;
      banks = 1;
      caches = 24;
      type = "Simple";
      array :
      {
        ways = 16;
        type = "SetAssoc";
        hash = "None";
      };
      repl :
      {
        type = "MN4L2";
      };
      latency = 10;
      nonInclusiveHack = false;
    };
    l3 :
    {
      children = "l2";
      isPrefetcher = false;
      size = 34603008;
      banks = 24;
      caches = 1;
      type = "Simple";
      array :
      {
        ways = 11;
        type = "SetAssoc";
        hash = "H3";
      };
      repl :
      {
        type = "MN4LLC";
      };
      latency = 22;
      nonInclusiveHack = false;
    };
  };
  mem :
  {
    # RAMULATOR
    # type = "Ramulator";
    # boundPhaseLatencyEstimator = "mavg";
    # latency = 1;
    # controllers= 6;
    # ramulatorConfig = "../../simulator-source/ramulator/ramulator-configs/DDR4-config-MN4-skylake.cfg";
    # trackCores = "0 1"


    # RAMULATOR2
    #  type = "Ramulator2";
    #  boundPhaseLatencyEstimator = "avg";
    #  latency = 1;
    #  controllers= 6;
    #  ramulator2Config = "../../simulator-source/ramulator2/ramulator2_config.yaml";

    ## DRAMSIM3
    type = "DRAMsim3";
    dumpTrace = false;
    boundPhaseLatencyEstimator = "mavg";
    latency = 1;
    controllers = 6;
    configIni = "../../simulator-source/dramsim3/DRAMsim3/configs/MN4.ini";
    outputDir = "./output";
    trackCores = "0 1"
  };
  network :
  {
    type = "MeshMD1"
    networkConfig = "../../simulator-source/zsim-bsc/cascade_lake_noc_config.txt"
  };
};



 process0 : 
 {
   patchRoot = "";
   groupWithPrevious = false;
